name: Déploiement OVH

# Construit le site et l'envoie sur l'hébergement OVH par FTP,
# à chaque push sur main (ou manuellement via l'onglet Actions).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Évite deux déploiements simultanés.
concurrency:
  group: deploy-ovh
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site (génère dist/)
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: npm run build

      - name: Générer la config e-mail du formulaire (depuis les secrets)
        env:
          MAIL_USER: ${{ secrets.OVH_MAIL_USER }}
          MAIL_PASS: ${{ secrets.OVH_MAIL_PASSWORD }}
          MAIL_HOST: ${{ secrets.OVH_MAIL_HOST }}
          MAIL_PORT: ${{ secrets.OVH_MAIL_PORT }}
        run: |
          if [ -z "$MAIL_USER" ]; then
            echo "Aucun secret e-mail configuré — le formulaire reste en mode démo."
            exit 0
          fi
          mkdir -p dist/api
          jq -n \
            --arg host "${MAIL_HOST:-ssl0.ovh.net}" \
            --argjson port "${MAIL_PORT:-465}" \
            --arg user "$MAIL_USER" \
            --arg pass "$MAIL_PASS" \
            --arg to "$MAIL_USER" \
            '{host: $host, port: $port, user: $user, pass: $pass, to: $to}' \
            > dist/api/mailer.secret.json
          echo "Config e-mail générée."

      # Envoi via SFTP (port 22) avec repli en FTP simple (port 21).
      # OVH cluster129 refuse le FTPS explicite ; SFTP est la bonne méthode.
      # ⚠️ Le dossier cible est ./www/ (racine du site sur OVH). Si atelierjf.fr
      #    pointe vers un sous-dossier dans OVH → Multisite, remplacer ./www/.
      - name: Déployer sur OVH (SFTP, repli FTP)
        env:
          OVH_USER: ${{ secrets.OVH_FTP_USERNAME }}
          OVH_PASS: ${{ secrets.OVH_FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          CMDS="set sftp:auto-confirm yes; set ftp:ssl-allow no; set net:timeout 25; set net:max-retries 2; mirror -R --delete --parallel=3 --verbose ./dist/ ./www/; bye"
          echo '-> Tentative SFTP (port 22)...'
          if lftp -u "$OVH_USER","$OVH_PASS" sftp://ftp.cluster129.hosting.ovh.net:22 -e "$CMDS"; then
            echo 'Deploiement SFTP reussi'
          else
            echo 'SFTP indisponible -> repli en FTP simple (port 21)...'
            lftp -u "$OVH_USER","$OVH_PASS" ftp://ftp.cluster129.hosting.ovh.net:21 -e "$CMDS"
          fi
